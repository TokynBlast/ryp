#! English
# The above comment sets the language for Ryp to be rendered in.
# It does not change the language of any of the configs.
# The language of the configs cannot be changed, it's a security thing of being
# able to read what the config file will do.
#
# Rather than having something like...
# [ryp]
# language = "English"
# We make it so that you don't need to know how to say "language" in English!

# Settings inheritance for GUI
[gui.inherit]
type = "fill" # fill in blanks
parent = "gui default" # fill with GUI default

# Settings inheritance for TUI
[tui.inherit]
type = "overwrite" # ignore all tui settings
parent = "gui" # use GUI settings

# Background is the color behind the actual text... The background!
[sidebar.color.background]
active = "#EE7101"
inactive = "#808080"

# This sets the color of the font
[sidebar.color.foreground]
active = "#EE7101"
inactive = "#FFFFFF"

# Keybinds to interact with the sidebar
[sidebar.keybinds]
previous = "Ctrl+A"
next = "Ctrl+D"
toggle = "Ctrl+B"

# Color of the currently active tab
[tab.color.active]
background = "#EE7101"
foreground = "#EE7101"

# Color of inactive tabs
[tab.color.inactive]
background = "#808080"
foreground = "#FFFFFF"

# Keybinds to interact with the editor
[tab.keybinds]
left = "Ctrl+A"
right = "Ctrl+D"
close = "Ctrl+W"

# General settings for the editor
[editor]
background = "#323232"
tab_size = 4

# The console that plugins print to
# `character` sets the character before every print
[plugins.console]
character = "λ"
toggle = "Ctrl+E"
color = "#BF00FF"

# Extra config stuff about saving
[saving]
on = true
time = 30_000
keybind = "Ctrl+S"

# These control the color the text is when doing a selection hilight (Shift+Arrow on TUI)
[selection.highlighting]
foreground = "#000000"
background = "#0084FF"

# This is the color the text is when doing a global search, for the item you're on
[search.highlighting.selected]
background = "#FFFF00"
foreground = "#000000"

# The opposite of above, where instead of what you're on, what you're not on
[search.highlighting.unselected]
background = "#00FFFF"
foreground = "#FFFFFF"

# The keybinds to manage Git
[git.keybinds]
refresh = "Ctrl+G"

# These are left empty on purpose, they have no default binding
push = ""
pull = ""
new_repo = "Ctrl+Alt+N"
